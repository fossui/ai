tags: [tabs, tab, segmented, underline, navigation, panel, layout]
whenToUse: >-
  A row or column of tabs that toggle between sibling panels, with an animated
  indicator on the active tab. Use variant for the look (segmented pill or
  underline) and orientation for the axis. Each tab is a FossTab data object,
  not a widget. The strip does not scroll or shrink to fit: a horizontal strip
  lays every label in one row, so on a phone keep labels short and the count
  low, or switch to the vertical orientation, to avoid an overflow.
conventions:
  do:
    - Build the strip from a List of FossTab, each carrying a value, a label String, and an optional content panel.
    - Control selection by passing value with onChanged, or leave value null and seed initialValue to let the widget hold its own.
    - Give the type argument on FossTabs and FossTab so value stays typed, for example FossTabs of String.
    - Pick the look with variant and the axis with orientation; both are enums.
    - Put a leading glyph in a tab's icon slot; it takes any Widget with no icon dependency.
    - For a one-off restyle, pass a FossTabsStyle to style; retheme globally through FossThemeData otherwise.
  dont:
    - Do not build tabs from widgets; FossTab is data, and the panel goes in its content field.
    - Do not pass a String for variant or orientation; they are FossTabsVariant and FossTabsOrientation.
    - Do not set both value and expect internal state; passing value makes it controlled, so you must drive onChanged.
    - Do not pass color, indicatorColor, or radius to the constructor; overrides live on FossTabsStyle passed to style.
    - Do not crowd a horizontal strip with long or many labels; it does not scroll and overflows on a narrow screen. Shorten labels, cut the count, or go vertical.
commonMistakes:
  - wrong: "FossTabs(tabs: [Tab(text: 'Home'), Tab(text: 'Settings')])"
    right: "FossTabs<String>(tabs: const [FossTab(value: 'home', label: 'Home'), FossTab(value: 'settings', label: 'Settings')])"
    why: the item type is FossTab with a value and a label String, not a widget Tab.
  - wrong: "FossTabs<String>(tabs: tabs, variant: 'underline')"
    right: "FossTabs<String>(tabs: tabs, variant: FossTabsVariant.underline)"
    why: variant is an enum, not a string.
  - wrong: "FossTabs<String>(value: selected, tabs: tabs)"
    right: "FossTabs<String>(value: selected, onChanged: (v) => setState(() => selected = v), tabs: tabs)"
    why: passing value makes the tabs controlled, so selection never changes without an onChanged handler.
  - wrong: "FossTabs<String>(tabs: tabs, indicatorColor: Colors.green)"
    right: "FossTabs<String>(tabs: tabs, style: const FossTabsStyle(indicatorColor: Color(0xFF10B981)))"
    why: there is no per-instance color param; overrides live on FossTabsStyle passed to style.
